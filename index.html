<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AB Test</title>

<style>
  body{
    font-family:sans-serif;
    text-align:center;
    padding-top:100px;
  }

  .banner{
    font-size:50px;
    font-weight:bold;
  }

  .sticker{
    display:inline-block;
    background:red;
    color:white;
    padding:10px 20px;
    border-radius:30px;
    margin-left:10px;
    font-size:25px;
  }
</style>
</head>

<body>

<div id="test-area"></div>

<script>
  const variant = Math.random() < 0.5 ? "A" : "B";

  if(variant === "A"){
    document.getElementById("test-area").innerHTML = `
      <div class="banner">
        무료배송
      </div>
    `;
  } else {
    document.getElementById("test-area").innerHTML = `
      <div class="banner">
        무료배송
        <span class="sticker">EVENT</span>
      </div>
    `;
  }

  console.log("Variant:", variant);
</script>

</body>
</html>
